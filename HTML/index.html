<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoZ Landing Page</title>
    <link rel="stylesheet" href="/CSS/style.css">
</head>

<body>
    <header>
        <nav class="navbar-container">
            <div class="navbar-left">
                <div class="first-logo"><img src="/cryptoZAssets/nexo-(nexo).png" alt="nexo"></div>
                <div class="second-logo"><img src="/cryptoZAssets/CryptoZlogo.png" alt="cryptoZ-logo"></div>

                </ul>
            </div>
            <div class="navbar-center">
                <a href="#">Products</a>
                <a href="#">Price</a>
                <a href="#">Learn</a>
                <a href="">Support</a>
            </div>
            <div class="navbar-right">
                <a href="#">Sign in</a>
                <a href="#" class="getStarted" style="color: #FFFFFF;">Get started</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="all-in-one">
            <div class="account-container">
                <div class="account-header">
                    <h4>Your all-in-one platform to buy, sell trade and earn Cryptocurrencies</h4>
                </div>
                <div class="account-desc">
                    <p>Open a free account in minutes right from your phone and make your money go further.</p>
                </div>
                <div class="account-opening-bar">
                    <div class="input-email">
                        <input type="text" placeholder="Email Address...">
                        <button class="get-started">Get started</button>
                    </div>
                </div>
            </div>
            <div class="converter-container">
                <!-- <div class="bitcon-image">
                    <img src="/cryptoZAssets/bitcoinRight.png" alt="Bitcoin">
                </div> -->
                <div class="currency-converter">
                    <h3>Currency Converter</h3>
                    <div class="input-group">
                        <label for="">Amount</label>
                        <div class="input-row">
                            <div class="currency-select">
                                <img src="https://flagcdn.con/w40/gb.png" alt="flag">
                                <select name="" id="" class="base-currency"></select>
                                <span class="chevron"></span>
                            </div>
                            <div class="divider"></div>
                            <input type="text" id="base-amount" placeholder="1" step="any">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="">Converted to</label>
                        <div class="input-row">
                            <div class="currency-select">
                                <img src="https://flagcdn.con/w40/au.png" alt="flag">
                                <select name="" id="" class="quote-currency"></select>
                                <span class="chevron"></span>
                            </div>
                            <div class="divider"></div>
                            <input type="text" id="quote-amount" readonly placeholder="0.0000">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="">Date</label>
                        <div class="input-row">
                            <input type="date">
                        </div>
                    </div>
                    <div class="foot-currency">
                        <span>EUR</span> <span>GBP</span> <span>BTC</span>
                    </div>
                    
                </div>
                <!-- <div class="cam">
                    <img src="/cryptoZAssets/Cam1.png" alt="Cam1">
                </div> -->
            </div>
        </section>
    </main>

</body>

</html>
